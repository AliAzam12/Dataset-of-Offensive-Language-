task:
  name: multilingual_offensive_language_detection
  label_column: final_label
  text_column: clean_text
  labels:
    non-offensive: 0
    offensive: 1

splits:
  train: "train data.csv"
  validation: "validation data.csv"
  test: "test data.csv"

metrics:
  primary: macro_f1
  secondary:
    - accuracy
    - precision_macro
    - recall_macro

traditional_ml:
  tfidf:
    word_ngram_range: [1, 2]
    char_ngram_range: [3, 5]
    max_features: 100000
    min_df: 2
  models:
    naive_bayes:
      alpha: 1.0
    logistic_regression:
      class_weight: balanced
      max_iter: 1000
      random_state: 42
    random_forest:
      n_estimators: 200
      class_weight: balanced
      random_state: 42
    linear_svm:
      class_weight: balanced
      random_state: 42

deep_learning:
  max_sequence_length: 128
  optimizer: adam
  loss: cross_entropy
  model_selection: best_validation_macro_f1
  candidate_models:
    - CNN
    - BiLSTM
    - CNN-BiLSTM
    - Attention-BiLSTM

transformers:
  max_sequence_length: 128
  batch_size: 16
  learning_rate: 0.00002
  epochs: 5
  optimizer: adamw
  model_selection: best_validation_macro_f1
  candidate_models:
    - bert-base-multilingual-cased
    - xlm-roberta-base
    - google/mt5-base
    - google/muril-base-cased
    - ai4bharat/indic-bert
    - PashtoBERT

qlora:
  max_sequence_length: 128
  batch_size: 8
  gradient_accumulation_steps: 4
  effective_batch_size: 32
  learning_rate: 0.0001
  epochs: 3
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  quantization: 4bit
  compute_dtype: bfloat16
  model_selection: best_validation_macro_f1
  candidate_models:
    - Mistral-7B
    - Gemma-3
    - Qwen3
    - DeepSeek-R1
    - LLaMA-3.1-8B